  <script>
    let aktifMod = 'isg'; 
    let aktifSantiye = 'TÜMÜ';
    
    const SANTIYE_SPS = { 
      'TÜMÜ': 100, 
      'Karapınar GES': 50, 
      'Osmaniye GES': 120, 
      'Gülcük GES': 80,
      'Viranşehir GES': 90
    };

    let riskChartInstance = null;
    let personelSozluk = {}; 
    let seciliRaporId = null; 
    let tumRaporlarData = [];
    
    let aktifPersonelRaporlari = []; // Profil incelenen personelin raporlarını tutar
    // Personel filtrelemesi için veriyi tutacağımız değişken
    let globalPersonelData = [];

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full');
      document.getElementById('sidebarOverlay').classList.toggle('hidden');
    }

    window.onload = async () => {
      const pId = localStorage.getItem('kullanici_id');
      if (!pId) { window.location.href = 'index.html'; return; }
      
      document.getElementById('adminBasHarf').textContent = (localStorage.getItem('ad_soyad') || 'A').charAt(0).toUpperCase();

      const { data: pData } = await db.from('personel').select('id, ad_soyad');
      if(pData) { pData.forEach(p => personelSozluk[p.id] = p.ad_soyad); }

      renderView('dashboard');
    };

    function cikisYap() { localStorage.clear(); window.location.href = 'index.html'; }

    function modDegistir(yeniMod) {
      aktifMod = yeniMod;
      document.getElementById('btnModIsg').className = aktifMod === 'isg' 
        ? "px-4 md:px-6 py-2 text-xs md:text-sm font-black rounded-lg bg-white shadow-md text-blue-700 transition-all flex items-center gap-2"
        : "px-4 md:px-6 py-2 text-xs md:text-sm font-black rounded-lg text-slate-500 hover:text-blue-600 transition-all flex items-center gap-2";
      document.getElementById('btnModSaglik').className = aktifMod === 'saglik'
        ? "px-4 md:px-6 py-2 text-xs md:text-sm font-black rounded-lg bg-white shadow-md text-teal-700 transition-all flex items-center gap-2"
        : "px-4 md:px-6 py-2 text-xs md:text-sm font-black rounded-lg text-slate-500 hover:text-teal-600 transition-all flex items-center gap-2";
      renderView('dashboard');
    }
    function santiyeDegistir() { aktifSantiye = document.getElementById('santiyeSecici').value; renderView('dashboard'); }

    // CSV İNDİRME YARDIMCI FONKSİYONU
    function csvIndir(filename, rows) {
      const basliklar = rows.shift(); // İlk satırı başlık olarak al
      // CSV formatına uygun hale getir (Noktalı virgül ile ayırıyoruz Excel Türkçe uyumu için)
      let csvContent = "\uFEFF"; // UTF-8 BOM
      csvContent += basliklar.join(";") + "\n";
      
      rows.forEach(rowArray => {
        let row = rowArray.map(item => {
           // Metin içindeki çift tırnakları, noktalı virgülleri ve yeni satırları temizle/değiştir
           let stringItem = String(item).replace(/"/g, '""').replace(/\n/g, ' '); 
           return `"${stringItem}"`; // Excel için güvenli hale getirmek için tırnak içine al
        });
        csvContent += row.join(";") + "\n";
      });

      let blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      let link = document.createElement("a");
      let url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", filename);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function renderView(view) {
      const area = document.getElementById('contentArea');
      const baslik = document.getElementById('sayfaBasligi');
      const modSalteri = document.getElementById('modSalteri');
      const santiyeSecici = document.getElementById('santiyeSecici');

      if (view === 'dashboard') { modSalteri.classList.remove('hidden'); santiyeSecici.classList.remove('hidden'); }
      else { modSalteri.classList.add('hidden'); santiyeSecici.classList.add('hidden'); }

      if(view === 'dashboard') {
        const sMetin = aktifSantiye === 'TÜMÜ' ? 'Genel Saha' : aktifSantiye;
        baslik.innerHTML = aktifMod === 'isg' 
          ? `<i class="fas fa-satellite-dish text-blue-600"></i> İSG Operasyon Merkezi <span class="text-sm font-normal text-slate-500 ml-2">(${sMetin})</span>`
          : `<i class="fas fa-heartbeat text-teal-600"></i> Sağlık & Revir Merkezi <span class="text-sm font-normal text-slate-500 ml-2">(${sMetin})</span>`;
        
        let haritaHTML = '';
        const spsSayisi = SANTIYE_SPS[aktifSantiye];
        for(let i=1; i<=spsSayisi; i++) {
           haritaHTML += `<div id="sps-${i}" class="w-8 h-8 rounded-full bg-slate-100 border border-slate-300 flex items-center justify-center text-[10px] font-bold text-slate-400 transition-all shadow-sm cursor-pointer m-1">${i}</div>`;
        }

        let statsHTML = aktifMod === 'isg' 
          ? `<div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center"><p class="text-[10px] text-blue-600 font-bold uppercase">Mekanik</p><p class="text-2xl font-black text-blue-700 mt-1" id="statMekanik">0</p></div>
             <div class="bg-amber-50 p-3 rounded-xl border border-amber-100 text-center"><p class="text-[10px] text-amber-600 font-bold uppercase">Elektrik</p><p class="text-2xl font-black text-amber-700 mt-1" id="statElektrik">0</p></div>
             <div class="bg-red-50 p-3 rounded-xl border border-red-100 text-center"><p class="text-[10px] text-red-600 font-bold uppercase">Uygunsuzluk</p><p class="text-2xl font-black text-red-700 mt-1" id="statUygunsuzluk">0</p></div>
             <div class="bg-rose-50 p-3 rounded-xl border border-rose-100 text-center"><p class="text-[10px] text-rose-600 font-bold uppercase">Ramak Kala</p><p class="text-2xl font-black text-rose-700 mt-1" id="statRamak">0</p></div>
             <div class="bg-teal-50 p-3 rounded-xl border border-teal-100 text-center"><p class="text-[10px] text-teal-600 font-bold uppercase">Denetim</p><p class="text-2xl font-black text-teal-700 mt-1" id="statDenetim">0</p></div>
             <div class="bg-slate-100 p-3 rounded-xl border border-slate-200 text-center"><p class="text-[10px] text-slate-500 font-bold uppercase">Toplam Rapor</p><p class="text-2xl font-black text-slate-800 mt-1" id="statToplam">0</p></div>`
          : `<div class="bg-teal-50 p-3 rounded-xl border border-teal-100 text-center"><p class="text-[10px] text-teal-600 font-bold uppercase">Poliklinik</p><p class="text-2xl font-black text-teal-700 mt-1" id="statPoliklinik">0</p></div>
             <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 text-center"><p class="text-[10px] text-blue-600 font-bold uppercase">İşe Giriş Raporu</p><p class="text-2xl font-black text-blue-700 mt-1" id="statIseGiris">0</p></div>
             <div class="bg-orange-50 p-3 rounded-xl border border-orange-100 text-center"><p class="text-[10px] text-orange-600 font-bold uppercase">Kronik Hastalar</p><p class="text-2xl font-black text-orange-700 mt-1" id="statKronik">0</p></div>
             <div class="bg-red-50 p-3 rounded-xl border border-red-100 text-center"><p class="text-[10px] text-red-600 font-bold uppercase">Çalışmaya Engel</p><p class="text-2xl font-black text-red-700 mt-1" id="statEngel">0</p></div>
             <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100 text-center"><p class="text-[10px] text-emerald-600 font-bold uppercase">Aktif Sağlıkçı</p><p class="text-2xl font-black text-emerald-700 mt-1" id="statSaglikci">0</p></div>
             <div class="bg-slate-100 p-3 rounded-xl border border-slate-200 text-center"><p class="text-[10px] text-slate-500 font-bold uppercase">Tıbbi Kayıt</p><p class="text-2xl font-black text-slate-800 mt-1" id="statToplamSaglik">0</p></div>`;

        // Kategoriler Mod'a göre değişiyor
        let kategoriSecenekleri = aktifMod === 'isg' 
          ? `<option value="Elektrik">Elektrik</option><option value="Mekanik">Mekanik</option><option value="Altyapı">Altyapı</option><option value="Panel">Panel</option><option value="Uygunsuzluk">Uygunsuzluk</option><option value="Ramak Kala">Ramak Kala</option><option value="İş Durdurma">İş Durdurma</option><option value="Denetim">Denetim</option><option value="Toolbox">Toolbox</option>`
          : `<option value="Poliklinik Muayenesi">Poliklinik Muayenesi</option><option value="İşe Giriş Raporu">İşe Giriş Raporu</option>`;

        area.innerHTML = `
          <div class="grid grid-cols-3 md:grid-cols-6 gap-2 md:gap-3 mb-6">${statsHTML}</div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="lg:col-span-2 bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
               <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-map-marked-alt text-blue-500"></i> ${aktifSantiye} Haritası</h3>
               <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-wrap justify-center items-center shadow-inner min-h-[250px]">${haritaHTML}</div>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 overflow-y-auto h-full">
               <h3 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2 pb-2 border-b border-slate-50"><i class="fas fa-bolt ${aktifMod==='isg'?'text-orange-500':'text-teal-500'}"></i> Canlı Log (Son 5)</h3>
               <div id="sagCanliAkis" class="space-y-2 mt-2 text-center text-xs text-slate-400">Veri bekleniyor...</div>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 h-fit">
               <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-chart-bar text-indigo-500"></i> Kategori Analizi</h3>
               <div class="relative h-56 w-full"><canvas id="yatayRiskChart"></canvas></div>
            </div>
            <div class="lg:col-span-2 bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
              <div class="flex flex-col sm:flex-row justify-between mb-4 gap-4 pb-4 border-b">
                <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-list ${aktifMod==='isg'?'text-blue-500':'text-teal-500'}"></i> Detaylı Rapor Listesi</h3>
                
                <!-- YENİ: KATEGORİ FİLTRESİ EKLENDİ -->
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                  <input type="text" id="aramaKutusu" onkeyup="filtreleRaporlar()" placeholder="Ara..." class="flex-1 sm:w-32 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none">
                  
                  <select id="kategoriFiltresi" onchange="filtreleRaporlar()" class="border border-slate-200 rounded-lg px-2 py-2 text-sm outline-none">
                    <option value="TÜMÜ">Tüm Türler</option>
                    ${kategoriSecenekleri}
                  </select>

                  <select id="riskFiltresi" onchange="filtreleRaporlar()" class="${aktifMod === 'saglik' ? 'hidden' : ''} border border-slate-200 rounded-lg px-2 py-2 text-sm outline-none">
                    <option value="TÜMÜ">Tüm Riskler</option><option value="KRİTİK">Kritik</option><option value="ORTA">Orta</option><option value="DÜŞÜK">Düşük</option>
                  </select>
                </div>
              </div>
              <div id="canliAkis" class="space-y-4 overflow-y-auto max-h-[500px] no-scrollbar"></div>
            </div>
          </div>
        `;
        verileriYukle();

      } else if (view === 'personel') {
        baslik.textContent = "Personel Zekası & Profiller";
        area.innerHTML = `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <!-- YENİ: PERSONEL FİLTRELEME BÖLÜMÜ -->
            <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
               <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-users-cog text-blue-500"></i> Aktif Personeller</h3>
               <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                  <select id="persSantiyeFiltre" onchange="personelFiltrele()" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none">
                    <option value="TÜMÜ">Tüm Şantiyeler</option>
                    <option value="Karapınar GES">Karapınar GES</option>
                    <option value="Osmaniye GES">Osmaniye GES</option>
                    <option value="Gülcük GES">Gülcük GES</option>
                    <option value="Viranşehir GES">Viranşehir GES</option>
                  </select>
                  <select id="persRolFiltre" onchange="personelFiltrele()" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none">
                    <option value="TÜMÜ">Tüm Roller</option>
                  </select>
               </div>
            </div>

            <div class="overflow-x-auto no-scrollbar">
              <table class="w-full text-left border-collapse min-w-[500px]">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs md:text-sm uppercase tracking-wider">
                  <tr><th class="p-4 font-semibold">Ad Soyad</th><th class="p-4 font-semibold">Şantiye</th><th class="p-4 font-semibold">Ünvan/Rol</th><th class="p-4 font-semibold text-right">İşlem</th></tr>
                </thead>
                <tbody id="personelTableBody" class="divide-y divide-slate-100"></tbody>
              </table>
            </div>
          </div>`;
        personelleriGetir();
      }
    }

    async function verileriYukle() {
      const tabloAdi = aktifMod === 'isg' ? 'raporlar' : 'raporlar_saglik';
      let sorgu = db.from(tabloAdi).select('*, personel(ad_soyad, santiye)').order('olusturulma_tarihi', {ascending: false});
      
      try {
        const { data: veriler, error } = await sorgu;
        if (error) throw error;

        if (veriler) {
          let temizVeriler = veriler;
          if (aktifMod === 'isg') {
             temizVeriler = veriler.filter(r => {
                const k = (r.kategori || '').toLowerCase();
                return !k.includes('muayene') && !k.includes('giriş raporu') && !k.includes('taraması');
             });
          }

          tumRaporlarData = temizVeriler.filter(r => {
             const pSantiye = r.personel ? r.personel.santiye : '';
             return aktifSantiye === 'TÜMÜ' || pSantiye === aktifSantiye;
          });

          let statData = { genelToplam: tumRaporlarData.length };
          let sagCanliAkisHTML = '';

          if (aktifMod === 'isg') statData = { ...statData, elektrik: 0, mekanik: 0, denetim: 0, uygunsuzluk: 0, ramak: 0 };
          else statData = { ...statData, poliklinik: 0, isegiris: 0, kronik: 0, engel: 0, saglikci: new Set() };

          tumRaporlarData.forEach((r, index) => {
            let kat = (r.kategori || '').toLowerCase();
            
            if (aktifMod === 'isg') {
               if(kat.includes('elektrik')) statData.elektrik++;
               else if(kat.includes('mekanik')) statData.mekanik++;
               else if(kat.includes('denetim')) statData.denetim++;
               else if(kat.includes('uygunsuzluk')) statData.uygunsuzluk++;
               else if(kat.includes('ramak')) statData.ramak++;
            } else {
               if(kat.includes('poliklinik')) statData.poliklinik++;
               else if(kat.includes('işe giriş')) statData.isegiris++;
               if(r.kronik_rahatsizlik && r.kronik_rahatsizlik.toLowerCase() !== 'yok') statData.kronik++;
               if(r.calismaya_engel && r.calismaya_engel.toLowerCase() !== 'yok') statData.engel++;
               if(r.personel && r.personel.ad_soyad) statData.saglikci.add(r.personel.ad_soyad);
            }

            let alan = r.saha_alani || ''; 
            if (alan.toUpperCase().startsWith('SPS-')) {
               let num = parseInt(alan.split('-')[1]);
               let spsEl = document.getElementById(`sps-${num}`);
               if(spsEl) {
                  spsEl.classList.remove('bg-slate-100', 'text-slate-400');
                  spsEl.classList.add('text-white', 'shadow-md');
                  if (aktifMod === 'isg') {
                    if(r.risk_seviyesi === 'KRİTİK') spsEl.classList.add('bg-red-500', 'animate-pulse-fast'); 
                    else spsEl.classList.add('bg-blue-500');
                  } else {
                    spsEl.classList.add('bg-teal-500', 'animate-pulse-fast');
                  }
               }
            }

            if (index < 5) {
               const pAd = (r.personel && r.personel.ad_soyad) ? r.personel.ad_soyad.split(' ')[0] : 'Personel';
               sagCanliAkisHTML += `<div class="bg-slate-50 p-2 rounded-lg border border-slate-100 text-[10px] text-left shadow-sm flex flex-col"><span class="font-bold ${aktifMod === 'isg' ? 'text-blue-600' : 'text-teal-600'} uppercase tracking-wider mb-0.5">${r.kategori || 'Kayıt'}</span> <span class="text-slate-500">${pAd} • ${r.saha_alani || 'Belirsiz'}</span></div>`;
            }
          });

          if (aktifMod === 'isg' && document.getElementById('statElektrik')) {
            document.getElementById('statElektrik').textContent = statData.elektrik;
            document.getElementById('statMekanik').textContent = statData.mekanik;
            document.getElementById('statUygunsuzluk').textContent = statData.uygunsuzluk;
            document.getElementById('statRamak').textContent = statData.ramak;
            document.getElementById('statDenetim').textContent = statData.denetim;
            document.getElementById('statToplam').textContent = statData.genelToplam;
          } else if (aktifMod === 'saglik' && document.getElementById('statPoliklinik')) {
            document.getElementById('statPoliklinik').textContent = statData.poliklinik;
            document.getElementById('statIseGiris').textContent = statData.isegiris;
            document.getElementById('statKronik').textContent = statData.kronik;
            document.getElementById('statEngel').textContent = statData.engel;
            document.getElementById('statSaglikci').textContent = statData.saglikci.size;
            document.getElementById('statToplamSaglik').textContent = statData.genelToplam;
          }

          if(document.getElementById('sagCanliAkis')) document.getElementById('sagCanliAkis').innerHTML = sagCanliAkisHTML || 'Kayıt yok.';

          cizYatayGrafik(statData);
          filtreleRaporlar();
        }
      } catch(err) {
        console.error("Veri Çekme Hatası:", err);
        document.getElementById('canliAkis').innerHTML = `<div class="text-center text-red-500 py-10">Bağlantı hatası.</div>`;
      }
    }

    function filtreleRaporlar() {
      const aramaKutusu = document.getElementById('aramaKutusu');
      if(!aramaKutusu) return; 
      
      const aramaMetni = aramaKutusu.value.toLowerCase();
      const riskFiltresi = document.getElementById('riskFiltresi') ? document.getElementById('riskFiltresi').value : 'TÜMÜ';
      const kategoriFiltresi = document.getElementById('kategoriFiltresi') ? document.getElementById('kategoriFiltresi').value : 'TÜMÜ';

      const filtrelenmis = tumRaporlarData.filter(r => {
        const icerikMetni = JSON.stringify(r).toLowerCase();
        const aramaUyumu = icerikMetni.includes(aramaMetni);
        const riskUyumu = aktifMod === 'saglik' || riskFiltresi === 'TÜMÜ' || r.risk_seviyesi === riskFiltresi;
        const kategoriUyumu = kategoriFiltresi === 'TÜMÜ' || (r.kategori && r.kategori.includes(kategoriFiltresi));
        
        return aramaUyumu && riskUyumu && kategoriUyumu;
      });

      const akisAlani = document.getElementById('canliAkis');
      if (filtrelenmis.length === 0) {
        akisAlani.innerHTML = `<div class="text-center text-slate-400 py-10">Rapor bulunamadı.</div>`;
      } else {
        akisAlani.innerHTML = filtrelenmis.map(r => olusturRaporKarti(r)).join('');
      }
    }

    function cizYatayGrafik(statData) {
      const ctx = document.getElementById('yatayRiskChart');
      if(!ctx) return;
      if(riskChartInstance) riskChartInstance.destroy(); 
      
      let etiketler = [], veriler = [], renkler = [];
      if (aktifMod === 'isg') {
        etiketler = ['Elektrik', 'Mekanik', 'Uygunsuzluk', 'Ramak Kala', 'Denetim'];
        veriler = [statData.elektrik, statData.mekanik, statData.uygunsuzluk, statData.ramak, statData.denetim];
        renkler = ['#fbbf24', '#3b82f6', '#ef4444', '#f43f5e', '#14b8a6'];
      } else {
        etiketler = ['Poliklinik', 'İşe Giriş Raporu'];
        veriler = [statData.poliklinik, statData.isegiris];
        renkler = ['#0d9488', '#3b82f6'];
      }

      riskChartInstance = new Chart(ctx.getContext('2d'), {
        type: 'bar',
        data: { labels: etiketler, datasets: [{ data: veriler, backgroundColor: renkler, borderRadius: 6 }] },
        options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
      });
    }

    function olusturRaporKarti(r) {
      const tarih = new Date(r.olusturulma_tarihi).toLocaleString('tr-TR', { dateStyle: 'short', timeStyle: 'short' });
      const santiye = (r.personel && r.personel.santiye) ? r.personel.santiye : '';
      const personelAd = r.personel ? r.personel.ad_soyad : 'Bilinmiyor';

      if (aktifMod === 'saglik') {
        return `
          <div class="p-4 border-l-4 border-teal-500 border-y border-r rounded-xl bg-white shadow-sm mb-3">
            <div class="flex justify-between items-center mb-2">
              <div><span class="px-2 py-1 rounded bg-teal-50 text-teal-700 text-[10px] font-black">${r.kategori}</span><span class="text-[10px] text-slate-400 ml-2">${tarih} | Uzman: ${personelAd}</span></div>
            </div>
            <h4 class="font-bold text-slate-800 text-sm"><i class="fas fa-user-injured text-slate-400 mr-1"></i> ${r.hasta_ad_soyad} <span class="text-xs font-normal">(${r.hasta_yas} Yaş)</span></h4>
            <div class="mt-2 bg-slate-50 p-3 rounded-lg text-xs text-slate-600 border border-slate-100">
              ${r.kategori === 'Poliklinik Muayenesi' ? `<p><b>Şikayet:</b> ${r.sikayet || '-'}</p><p><b>Vital:</b> Tansiyon ${r.vital_tansiyon || '-'} | Şeker ${r.vital_seker || '-'}</p><p><b>Tedavi:</b> ${r.tedavi || '-'}</p>` : `<p><b>İş Tanımı:</b> ${r.is_tanimi || '-'}</p><p><b>Kronik/Engel:</b> ${r.kronik_rahatsizlik || '-'} / ${r.calismaya_engel || '-'}</p>`}
            </div>
          </div>`;
      } else {
        return `
          <div class="p-4 border-l-4 border-blue-500 border-y border-r rounded-xl bg-white shadow-sm mb-3">
            <div class="flex justify-between items-center mb-2">
              <div><span class="px-2 py-1 rounded bg-blue-50 text-blue-700 text-[10px] font-black">${r.kategori}</span><span class="text-[10px] text-slate-400 ml-2">${tarih}</span></div>
              <span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${r.risk_seviyesi === 'KRİTİK' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-600'}">${r.risk_seviyesi || 'BELİRSİZ'}</span>
            </div>
            <h4 class="font-bold text-slate-800 text-sm"><i class="fas fa-user-hard-hat text-slate-400 mr-1"></i> ${personelAd} <span class="text-xs font-normal text-slate-500">(${santiye})</span></h4>
            <p class="mt-2 text-sm text-slate-700 leading-relaxed">${r.rapor_metni}</p>
          </div>`;
      }
    }

    async function personelleriGetir() { 
      const { data } = await db.from('personel').select('*'); 
      if (data) { 
        globalPersonelData = data;
        
        const roller = [...new Set(data.map(p => p.unvan || p.rol).filter(r => r))];
        const persRolFiltre = document.getElementById('persRolFiltre');
        if(persRolFiltre) {
           persRolFiltre.innerHTML = '<option value="TÜMÜ">Tüm Roller</option>' + roller.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        personelFiltrele(); 
      } 
    }

    function personelFiltrele() {
      const pSantiye = document.getElementById('persSantiyeFiltre').value;
      const pRol = document.getElementById('persRolFiltre').value;

      const filtrelenmis = globalPersonelData.filter(p => {
         const sUyum = pSantiye === 'TÜMÜ' || p.santiye === pSantiye;
         const rUyum = pRol === 'TÜMÜ' || (p.unvan || p.rol) === pRol;
         return sUyum && rUyum;
      });

      const body = document.getElementById('personelTableBody');
      if(filtrelenmis.length === 0) {
         body.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-slate-400">Aranan kriterlere uygun personel bulunamadı.</td></tr>`;
      } else {
         body.innerHTML = filtrelenmis.map(p => {
           const isim = p.ad_soyad || 'İsimsiz Personel';
           return `<tr class="hover:bg-blue-50 transition"><td class="p-4 font-bold text-slate-800 flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-blue-100 text-blue-800 flex items-center justify-center font-bold">${isim.charAt(0)}</div>${isim}</td><td class="p-4 text-slate-600">${p.santiye || '-'}</td><td class="p-4"><span class="px-2 py-1 rounded bg-slate-100 text-slate-600 text-xs font-bold">${p.unvan || p.rol}</span></td><td class="p-4 text-right"><button onclick="showProfile('${p.id}')" class="bg-white border text-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm hover:bg-blue-600 hover:text-white transition">İncele</button></td></tr>`
         }).join('');
      }
    }

    // ONARILMIŞ VE HTML'E BAĞLANMIŞ PROFİL FONKSİYONU
    async function showProfile(personelId) {
      try {
        const { data: isgRaporlar } = await db.from('raporlar').select('*').eq('personel_id', personelId);
        const { data: saglikRaporlar } = await db.from('raporlar_saglik').select('*').eq('personel_id', personelId);
        
        let raporlar = [];
        if(isgRaporlar) raporlar = raporlar.concat(isgRaporlar);
        if(saglikRaporlar) raporlar = raporlar.concat(saglikRaporlar);

        if(raporlar.length > 0) { 
          aktifPersonelRaporlari = raporlar;
          document.getElementById('p-raporListesi').innerHTML = raporlar.map(r => {
             let rTip = r.hasta_ad_soyad ? 'Sağlık Raporu' : 'İSG Raporu';
             let color = rTip === 'Sağlık Raporu' ? 'teal' : 'blue';
             let metin = rTip === 'Sağlık Raporu' ? `[Hasta: ${r.hasta_ad_soyad}] - Şikayet/Tanım: ${r.sikayet || r.is_tanimi || ''}` : (r.rapor_metni || '');
             
             return `<div class="p-4 border border-${color}-100 rounded-xl bg-${color}-50 text-sm text-slate-700 flex flex-col gap-1 relative pr-14">
               <div class="flex justify-between items-center">
                 <span class="font-bold text-${color}-700 text-xs uppercase">${r.kategori}</span>
                 <span class="text-slate-400 text-xs">${new Date(r.olusturulma_tarihi).toLocaleDateString()}</span>
               </div>
               <p class="mt-1">${metin}</p>
               <button onclick="tekRaporPdfIndir('${r.id}', '${rTip}')" class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-white text-${color}-600 hover:bg-${color}-600 hover:text-white border border-${color}-200 p-2.5 rounded-lg shadow-sm transition" title="Bu Raporu PDF Olarak İndir">
                 <i class="fas fa-file-pdf"></i>
               </button>
             </div>`;
          }).join(''); 
        } else {
          document.getElementById('p-raporListesi').innerHTML = '<div class="text-center text-slate-400 py-10">Bu personelin henüz girdiği bir rapor bulunmamaktadır.</div>';
        }

        // HTML'de oluşturduğumuz profili görünür yapıyoruz
        const profilModal = document.getElementById('profilModal');
        if (profilModal) {
            profilModal.classList.remove('hidden');
        }
      } catch (error) {
        console.error("Profil yüklenirken bir hata oluştu:", error);
      }
    }

    async function personelRaporlariIndir(personelId, isim) {
      const { data: isgRaporlar } = await db.from('raporlar').select('*').eq('personel_id', personelId);
      const { data: saglikRaporlar } = await db.from('raporlar_saglik').select('*').eq('personel_id', personelId);
      
      let raporlar = [];
      if(isgRaporlar) raporlar = raporlar.concat(isgRaporlar);
      if(saglikRaporlar) raporlar = raporlar.concat(saglikRaporlar);

      if (raporlar.length === 0) {
         return alert("İndirilecek rapor bulunamadı.");
      }

      let csvRows = [];
      csvRows.push(["Tarih", "Kategori", "Saha / Alan", "Risk Seviyesi", "Rapor Metni / Detay"]);

      raporlar.forEach(r => {
         const tarih = new Date(r.olusturulma_tarihi).toLocaleDateString('tr-TR');
         const kat = r.kategori || 'Genel';
         const alan = r.saha_alani || 'Belirtilmemiş';
         const risk = r.risk_seviyesi || '-';
         
         let metin = '';
         if (r.hasta_ad_soyad) {
            metin = `Hasta: ${r.hasta_ad_soyad} - Not: ${r.sikayet || r.is_tanimi || ''}`;
         } else {
            metin = r.rapor_metni || '';
         }
         
         csvRows.push([tarih, kat, alan, risk, metin]);
      });

      const dosyaAdi = `Raporlar_${isim.replace(/\s+/g, '_')}_${new Date().toLocaleDateString('tr-TR')}.csv`;
      csvIndir(dosyaAdi, csvRows);
    }

    function aksiyonModalAc(raporId) { 
      seciliRaporId = raporId; 
      document.getElementById('sorumluSecim').innerHTML = '<option value="">Görevlendirilecek personeli seçin...</option>' + Object.keys(personelSozluk).map(id => `<option value="${id}">${personelSozluk[id]}</option>`).join(''); 
      document.getElementById('aksiyonModal').classList.remove('hidden'); 
    }
    
    function aksiyonModalKapat() { 
      document.getElementById('aksiyonModal').classList.add('hidden'); 
      document.getElementById('aksiyonMetni').value = ''; 
      seciliRaporId = null; 
    }
    
    async function aksiyonKaydet() { 
      const sorumluId = document.getElementById('sorumluSecim').value; 
      const metin = document.getElementById('aksiyonMetni').value.trim(); 
      if(!sorumluId || !metin) return alert("Eksik bilgi!"); 
      
      const btn = document.getElementById('aksiyonKaydetBtn'); 
      btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Atanıyor...`; btn.disabled = true; 
      const { error } = await db.from('aksiyonlar').insert({ rapor_id: seciliRaporId, sorumlu_id: sorumluId, aksiyon_metni: metin }); 
      btn.innerHTML = `Görevi Ata`; btn.disabled = false; 
      
      if(error) alert("Hata oluştu."); 
      else { aksiyonModalKapat(); verileriYukle(); } 
    }

    function tekRaporPdfIndir(raporId, tip) {
      const r = aktifPersonelRaporlari.find(x => x.id == raporId);
      if (!r) return alert("Rapor bulunamadı.");

      const tarih = new Date(r.olusturulma_tarihi).toLocaleString('tr-TR');
      let icerikHTML = "";
      let baslik = tip === 'Sağlık Raporu' ? "Tıbbi Revir Kaydı" : "İSG Saha Raporu";
      let renk = tip === 'Sağlık Raporu' ? "#0f766e" : "#1d4ed8";

      if (tip === 'Sağlık Raporu') {
        icerikHTML = `
          <p><strong>Hasta/Personel:</strong> ${r.hasta_ad_soyad} (${r.hasta_yas} Yaş, ${r.hasta_cinsiyet})</p>
          <p><strong>Kategori:</strong> ${r.kategori}</p>
          <p><strong>Şikayet / İş Tanımı:</strong> ${r.sikayet || r.is_tanimi || '-'}</p>
          <p><strong>Vital Bulgular:</strong> Tansiyon: ${r.vital_tansiyon || '-'} | Şeker: ${r.vital_seker || '-'}</p>
          <p><strong>Tedavi / Müdahale:</strong> ${r.tedavi || '-'}</p>
          <p><strong>Kronik Rahatsızlık:</strong> ${r.kronik_rahatsizlik || '-'}</p>
          <p><strong>Çalışmaya Engel:</strong> ${r.calismaya_engel || '-'}</p>
          <p><strong>Ekstra Notlar:</strong> ${r.ekstra_not || '-'}</p>
        `;
      } else {
        icerikHTML = `
          <p><strong>Saha/Alan:</strong> ${r.saha_alani || 'Belirtilmemiş'}</p>
          <p><strong>Kategori:</strong> ${r.kategori}</p>
          <p><strong>Risk Seviyesi:</strong> ${r.risk_seviyesi || 'BELİRSİZ'}</p>
          <p><strong>Rapor Detayı / Tespit:</strong></p>
          <p style="padding: 15px; background: #f8fafc; border-left: 4px solid ${renk}; margin-top: 10px; border-radius: 4px;">${r.rapor_metni}</p>
        `;
      }

      const printWindow = window.open('', '_blank', 'width=800,height=600');
      printWindow.document.write(`
        <html>
        <head>
          <title>ArCiv Rapor Çıktısı - ${tarih}</title>
          <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; color: #333; line-height: 1.6; }
            .header { border-bottom: 3px solid ${renk}; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
            .header h1 { margin: 0; color: ${renk}; font-size: 24px; text-transform: uppercase; }
            .header p { margin: 0; font-size: 12px; color: #666; font-weight: bold; }
            .content { background: #fff; padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; }
            .content p { margin-bottom: 10px; }
            .footer { margin-top: 40px; text-align: center; font-size: 10px; color: #999; border-top: 1px solid #eee; padding-top: 10px; }
            @media print { body { padding: 0; } }
          </style>
        </head>
        <body>
          <div class="header">
            <h1>${baslik}</h1>
            <p>Kayıt Tarihi: ${tarih}</p>
          </div>
          <div class="content">
            ${icerikHTML}
          </div>
          <div class="footer">Bu belge ArCiv Operasyon Sistemi tarafından otomatik olarak oluşturulmuştur.</div>
          <script>
            window.onload = function() { window.print(); window.close(); }
          <\/script>
        </body>
        </html>
      `);
      printWindow.document.close();
    }

  </script>
