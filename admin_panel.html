<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArCiv — Yönetim Komuta Merkezi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Kayıt Hatası:", err));
    }
  </script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 flex min-h-screen font-sans relative overflow-x-hidden">
  
  <div id="sidebarOverlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden backdrop-blur-sm transition-opacity"></div>

  <aside id="sidebar" class="bg-gradient-to-b from-blue-900 to-slate-900 text-white w-72 p-6 flex flex-col shadow-2xl fixed inset-y-0 left-0 z-40 transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
    <div class="text-center mb-10 pb-6 border-b border-blue-800 relative">
      <div class="w-16 h-16 bg-blue-800/50 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-inner">
        <i class="fas fa-shield-alt text-3xl text-blue-200"></i>
      </div>
      <h2 class="text-2xl font-black tracking-widest text-white">ArCiv</h2>
      <p class="text-xs text-blue-300 font-medium tracking-wider mt-1">İŞLETİM SİSTEMİ</p>
      <button onclick="toggleSidebar()" class="lg:hidden absolute top-0 right-0 text-blue-300 hover:text-white"><i class="fas fa-times text-xl"></i></button>
    </div>
    
    <nav class="space-y-3 flex-1">
      <button onclick="renderView('dashboard'); toggleSidebar();" class="w-full flex items-center text-left p-4 hover:bg-blue-800/50 rounded-xl transition text-sm font-semibold group">
        <i class="fas fa-satellite-dish w-8 text-blue-400 group-hover:text-white transition"></i> Canlı İzleme
      </button>
      <button onclick="renderView('personel'); toggleSidebar();" class="w-full flex items-center text-left p-4 hover:bg-blue-800/50 rounded-xl transition text-sm font-semibold group">
        <i class="fas fa-users w-8 text-blue-400 group-hover:text-white transition"></i> Personel Zekası
      </button>
      <button onclick="renderView('finans'); toggleSidebar();" class="w-full flex items-center text-left p-4 hover:bg-blue-800/50 rounded-xl transition text-sm font-semibold group">
        <i class="fas fa-wallet w-8 text-blue-400 group-hover:text-white transition"></i> Finansal Zeka
      </button>
    </nav>
    
    <button onclick="cikisYap()" class="w-full flex items-center text-left p-4 bg-red-500/10 hover:bg-red-500/20 text-red-300 rounded-xl transition text-sm font-semibold mt-auto">
      <i class="fas fa-power-off w-8"></i> Sistemden Çık
    </button>
  </aside>

  <main class="flex-1 p-4 md:p-8 lg:p-10 h-screen overflow-y-auto w-full">
    <div class="flex justify-between items-center mb-8 pb-4 border-b border-slate-200 gap-4">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden bg-white p-3 rounded-xl border border-slate-200 text-slate-700 hover:bg-slate-50 transition shadow-sm">
          <i class="fas fa-bars text-xl"></i>
        </button>
        <h1 id="sayfaBasligi" class="text-xl md:text-2xl font-bold text-slate-800 truncate">Yükleniyor...</h1>
      </div>
      
      <div class="flex items-center gap-2 md:gap-3 bg-white px-3 md:px-4 py-2 rounded-full shadow-sm border border-slate-200 flex-shrink-0">
        <div class="w-7 h-7 md:w-8 md:h-8 bg-blue-100 text-blue-800 rounded-full flex items-center justify-center font-bold text-xs md:text-sm" id="adminBasHarf">A</div>
        <span class="text-xs md:text-sm font-semibold text-slate-700 hidden sm:inline" id="adminIsim">Yönetici</span>
      </div>
    </div>
    <div id="contentArea" class="animate-fade-in"></div>
  </main>

  <div id="aksiyonModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col">
      <div class="p-5 border-b flex justify-between items-center bg-slate-50">
        <h3 class="font-bold text-slate-800"><i class="fas fa-tasks text-blue-600 mr-2"></i> Yeni Aksiyon Ata</h3>
        <button onclick="aksiyonModalKapat()" class="text-slate-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Sorumlu Personel</label>
          <select id="sorumluSecim" class="w-full border border-slate-300 rounded-xl px-4 py-3 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"></select>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Yapılacak İşlem</label>
          <textarea id="aksiyonMetni" class="w-full border border-slate-300 rounded-xl px-4 py-3 h-28 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"></textarea>
        </div>
      </div>
      <div class="p-5 border-t bg-slate-50 flex justify-end gap-3">
        <button onclick="aksiyonModalKapat()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition">İptal</button>
        <button id="aksiyonKaydetBtn" onclick="aksiyonKaydet()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-md transition flex items-center gap-2">Görevi Ata</button>
      </div>
    </div>
  </div>

  <div id="finansModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 transition-opacity">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col">
      <div class="p-5 border-b flex justify-between items-center bg-slate-50">
        <h3 id="finansModalBaslik" class="font-bold text-slate-800"><i class="fas fa-calculator text-blue-600 mr-2"></i> Finansal Kayıt Ekle/Düzenle</h3>
        <button onclick="finansModalKapat()" class="text-slate-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div class="p-6 space-y-3.5 overflow-y-auto max-h-[70vh]">
        <div class="grid grid-cols-2 gap-3 border-b border-slate-100 pb-3 mb-1">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">Kayıt Yılı</label>
            <select id="finansModalYil" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">Kayıt Ayı</label>
            <select id="finansModalAy" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
              <option value="Ocak">Ocak</option><option value="Şubat">Şubat</option><option value="Mart">Mart</option>
              <option value="Nisan">Nisan</option><option value="Mayıs">Mayıs</option><option value="Haziran">Haziran</option>
              <option value="Temmuz">Temmuz</option><option value="Ağustos">Ağustos</option><option value="Eylül">Eylül</option>
              <option value="Ekim">Ekim</option><option value="Kasım">Kasım</option><option value="Aralık">Aralık</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Personel Seçimi</label>
          <select id="finansPersonelSecim" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50"></select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Net Maaş (₺)</label>
            <input type="number" id="finansNetMaas" oninput="otomatikBrutHesapla()" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">SGK Kesintisi (₺)</label>
            <input type="number" id="finansSgkKesintisi" oninput="otomatikBrutHesapla()" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Brüt Maaş (₺) <span class="text-xs font-normal text-blue-600">(Otomatik)</span></label>
          <input type="number" id="finansBrutMaas" readonly class="w-full border border-slate-200 rounded-xl px-4 py-2.5 bg-slate-100 text-slate-500 font-bold outline-none">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">Çalışma Günü</label>
            <input type="number" id="finansCalismaGunu" value="22" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1">HT Günü</label>
            <input type="number" id="finansHtGunu" value="8" class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
          </div>
        </div>
      </div>
      <div class="p-5 border-t bg-slate-50 flex justify-end gap-3">
        <button onclick="finansModalKapat()" class="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition">İptal</button>
        <button id="finansKaydetBtn" onclick="finansKaydet()" class="px-5 py-2.5 bg-blue-900 hover:bg-blue-800 text-white rounded-xl font-bold shadow-md transition flex items-center gap-2">Kaydet</button>
      </div>
    </div>
  </div>

  <script>
    let riskChartInstance = null;
    let personelSozluk = {}; 
    let seciliRaporId = null; 
    let tumRaporlarData = [];
    
    // FİNANS DEĞİŞKENLERİ
    let globalFinansMetni = "";
    let duzenlenenFinansId = null; 
    let aktifFinansData = []; 

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    window.onload = async () => {
      const pId = localStorage.getItem('kullanici_id');
      if (!pId) { window.location.href = 'index.html'; return; }
      
      const ad = localStorage.getItem('ad_soyad') || 'Yönetici';
      document.getElementById('adminIsim').textContent = ad;
      document.getElementById('adminBasHarf').textContent = ad.charAt(0).toUpperCase();

      const { data: pData } = await db.from('personel').select('id, ad_soyad');
      if(pData) { pData.forEach(p => personelSozluk[p.id] = p.ad_soyad); }

      renderView('dashboard');
    };

    function cikisYap() { localStorage.clear(); window.location.href = 'index.html'; }

    function renderView(view) {
      const area = document.getElementById('contentArea');
      const baslik = document.getElementById('sayfaBasligi');

      if(view === 'dashboard') {
        baslik.textContent = "Saha Operasyon Merkezi";
        area.innerHTML = `
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8">
            <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 flex items-center gap-3 md:gap-4">
              <div class="w-10 h-10 md:w-14 md:h-14 bg-blue-50 text-blue-600 rounded-xl md:rounded-2xl flex items-center justify-center text-xl md:text-2xl"><i class="fas fa-file-alt"></i></div>
              <div><p class="text-slate-500 text-xs md:text-sm font-semibold">Toplam</p><p id="toplamRapor" class="text-xl md:text-3xl font-black text-slate-800">-</p></div>
            </div>
            <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 flex items-center gap-3 md:gap-4">
              <div class="w-10 h-10 md:w-14 md:h-14 bg-red-50 text-red-600 rounded-xl md:rounded-2xl flex items-center justify-center text-xl md:text-2xl"><i class="fas fa-exclamation-triangle"></i></div>
              <div><p class="text-slate-500 text-xs md:text-sm font-semibold">Kritik</p><p id="kritikRapor" class="text-xl md:text-3xl font-black text-slate-800">-</p></div>
            </div>
            <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 flex items-center gap-3 md:gap-4">
              <div class="w-10 h-10 md:w-14 md:h-14 bg-orange-50 text-orange-600 rounded-xl md:rounded-2xl flex items-center justify-center text-xl md:text-2xl"><i class="fas fa-bolt"></i></div>
              <div><p class="text-slate-500 text-xs md:text-sm font-semibold">Orta</p><p id="ortaRapor" class="text-xl md:text-3xl font-black text-slate-800">-</p></div>
            </div>
            <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 flex items-center gap-3 md:gap-4">
              <div class="w-10 h-10 md:w-14 md:h-14 bg-indigo-50 text-indigo-600 rounded-xl md:rounded-2xl flex items-center justify-center text-xl md:text-2xl"><i class="fas fa-tasks"></i></div>
              <div><p class="text-slate-500 text-xs md:text-sm font-semibold">Açık İşler</p><p id="acikAksiyonRapor" class="text-xl md:text-3xl font-black text-slate-800">-</p></div>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit">
              <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2"><i class="fas fa-chart-pie text-blue-500"></i> Risk Analiz Dağılımı</h3>
              <div class="relative h-56 w-full flex justify-center"><canvas id="riskChart"></canvas></div>
            </div>
            <div class="lg:col-span-2 bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
              <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-stream text-blue-500"></i> Saha Bildirimleri</h3>
                <div class="flex flex-col sm:flex-row gap-2 w-full xl:w-auto">
                  <div class="relative w-full sm:w-44">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                    <input type="text" id="aramaKutusu" onkeyup="filtreleRaporlar()" placeholder="Ara..." class="w-full border border-slate-200 rounded-lg pl-8 pr-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
                  </div>
                  <div class="flex gap-2 w-full">
                    <select id="riskFiltresi" onchange="filtreleRaporlar()" class="w-1/2 sm:w-auto border border-slate-200 rounded-lg px-2 py-2 text-xs md:text-sm outline-none bg-slate-50 font-medium text-slate-600">
                      <option value="TÜMÜ">Tüm Riskler</option><option value="KRİTİK">⚠️ Kritik</option><option value="ORTA">⚡ Orta</option><option value="DÜŞÜK">✅ Düşük</option>
                    </select>
                    <select id="durumFiltresi" onchange="filtreleRaporlar()" class="w-1/2 sm:w-auto border border-slate-200 rounded-lg px-2 py-2 text-xs md:text-sm outline-none bg-slate-50 font-medium text-slate-600">
                      <option value="TÜMÜ">Tüm Durumlar</option><option value="AÇIK">Bekleyen</option><option value="ÇÖZÜLDÜ">Çözülenler</option>
                    </select>
                  </div>
                </div>
              </div>
              <div id="canliAkiş" class="space-y-4 overflow-y-auto pr-2 max-h-[500px] no-scrollbar"></div>
            </div>
          </div>
        `;
        verileriYukle();

      } else if (view === 'personel') {
        baslik.textContent = "Personel Zekası & Profiller";
        area.innerHTML = `
          <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto no-scrollbar">
            <table class="w-full text-left border-collapse min-w-[500px]">
              <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs md:text-sm uppercase tracking-wider">
                <tr><th class="p-4 md:p-5 font-semibold">Ad Soyad</th><th class="p-4 md:p-5 font-semibold">Şantiye</th><th class="p-4 md:p-5 font-semibold">Ünvan/Rol</th><th class="p-4 md:p-5 font-semibold text-right">İşlem</th></tr>
              </thead>
              <tbody id="personelTableBody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>`;
        personelleriGetir();

      } else if (view === 'finans') {
        baslik.textContent = "Finansal Zeka ve Maliyet Yönetimi";
        const aylarTr = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const guncelAy = aylarTr[new Date().getMonth()];
        const guncelYil = new Date().getFullYear();

        area.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4 relative overflow-hidden">
              <div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-money-bill-wave"></i></div>
              <div><p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Toplam Net</p><p id="toplamNetMaas" class="text-2xl font-black text-slate-800">₺0</p></div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4 relative overflow-hidden">
              <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-percentage"></i></div>
              <div><p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Toplam SGK</p><p id="toplamSgkKesintisi" class="text-2xl font-black text-slate-800">₺0</p></div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-4 relative overflow-hidden">
              <div class="w-12 h-12 bg-blue-50 text-blue-900 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-chart-line"></i></div>
              <div><p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Toplam Brüt</p><p id="toplamBrutMaliyet" class="text-2xl font-black text-blue-900">₺0</p></div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col">
              <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-slate-100 pb-4">
                <div class="flex items-center gap-2">
                  <div class="bg-slate-100 p-1.5 rounded-xl flex gap-1 border border-slate-200 shadow-inner">
                    <select id="filtreYil" onchange="finansVerileriniYukle()" class="bg-transparent font-bold text-slate-700 outline-none text-sm px-2 cursor-pointer">
                      <option value="2025" ${guncelYil == 2025 ? 'selected' : ''}>2025</option>
                      <option value="2026" ${guncelYil == 2026 ? 'selected' : ''}>2026</option>
                      <option value="2027" ${guncelYil == 2027 ? 'selected' : ''}>2027</option>
                    </select>
                    <span class="text-slate-300">|</span>
                    <select id="filtreAy" onchange="finansVerileriniYukle()" class="bg-transparent font-bold text-blue-800 outline-none text-sm px-2 cursor-pointer">
                      <option value="TÜMÜ">Tüm Aylar</option>
                      ${aylarTr.map(ay => `<option value="${ay}" ${ay === guncelAy ? 'selected' : ''}>${ay}</option>`).join('')}
                    </select>
                  </div>
                </div>
                <button onclick="finansModalAc(null)" class="w-full sm:w-auto bg-blue-900 hover:bg-blue-800 text-white text-xs md:text-sm font-bold px-4 py-2.5 rounded-xl shadow transition flex items-center justify-center gap-2"><i class="fas fa-plus"></i> Kayıt Ekle</button>
              </div>
              <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse min-w-[650px]">
                  <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase font-bold">
                    <tr><th class="p-4">Personel</th><th class="p-4">Dönem</th><th class="p-4">Çalışma/HT</th><th class="p-4">Net</th><th class="p-4">SGK</th><th class="p-4">Brüt</th><th class="p-4 text-center">İşlem</th></tr>
                  </thead>
                  <tbody id="finansTableBody" class="divide-y divide-slate-100 text-xs md:text-sm">
                    <tr><td colspan="7" class="p-10 text-center text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>Yükleniyor...</td></tr>
                  </tbody>
                </table>
              </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit flex flex-col">
              <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-brain text-indigo-600"></i> AI Finans Analisti</h3>
              <div class="mb-5">
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-2">Özel Analiz İsteği (Opsiyonel)</label>

    // --- DASHBOARD (SAHA BİLDİRİMLERİ & GRAFİK) FONKSİYONLARI ---
    async function verileriYukle() {
      const { data: raporlar } = await db.from('raporlar').select('*, personel(ad_soyad, santiye), aksiyonlar(*)').order('olusturulma_tarihi', {ascending: false});
      if (raporlar) {
        tumRaporlarData = raporlar;
        let kritik = 0, orta = 0, dusuk = 0, acikAksiyonSayisi = 0;

        raporlar.forEach(r => {
          if(r.risk_seviyesi === 'KRİTİK') kritik++;
          else if(r.risk_seviyesi === 'ORTA') orta++;
          else dusuk++;
          if(r.aksiyonlar && r.aksiyonlar.length > 0 && r.aksiyonlar[0].durum === 'AÇIK') acikAksiyonSayisi++;
        });

        document.getElementById('toplamRapor').textContent = raporlar.length;
        document.getElementById('kritikRapor').textContent = kritik;
        document.getElementById('ortaRapor').textContent = orta;
        document.getElementById('acikAksiyonRapor').textContent = acikAksiyonSayisi;

        cizGrafik(kritik, orta, dusuk);
        filtreleRaporlar();
      }
    }

    function filtreleRaporlar() {
      const aramaMetni = document.getElementById('aramaKutusu').value.toLowerCase();
      const riskFiltresi = document.getElementById('riskFiltresi').value;
      const durumFiltresi = document.getElementById('durumFiltresi').value;

      const filtrelenmis = tumRaporlarData.filter(r => {
        const personelAd = personelSozluk[r.personel_id] || (r.personel ? r.personel.ad_soyad : '');
        const santiye = r.personel ? r.personel.santiye : '';
        const icerikMetni = `${personelAd} ${santiye} ${r.rapor_metni} ${r.ai_aciklama || ''}`.toLowerCase();
        const aramaUyumu = icerikMetni.includes(aramaMetni);
        const riskUyumu = riskFiltresi === 'TÜMÜ' || r.risk_seviyesi === riskFiltresi;
        let durumUyumu = true;
        const aksiyon = r.aksiyonlar && r.aksiyonlar.length > 0 ? r.aksiyonlar[0] : null;
        if (durumFiltresi === 'AÇIK') durumUyumu = aksiyon && aksiyon.durum === 'AÇIK';
        else if (durumFiltresi === 'ÇÖZÜLDÜ') durumUyumu = aksiyon && aksiyon.durum === 'ÇÖZÜLDÜ';

        return aramaUyumu && riskUyumu && durumUyumu;
      });

      const akisAlani = document.getElementById('canliAkiş');
      if (filtrelenmis.length === 0) {
        akisAlani.innerHTML = `<div class="text-center text-slate-400 py-10"><i class="fas fa-search text-3xl mb-3"></i><br>Rapor bulunamadı.</div>`;
      } else {
        akisAlani.innerHTML = filtrelenmis.map(r => olusturRaporKarti(r)).join('');
      }
    }

    function cizGrafik(kritik, orta, dusuk) {
      const ctx = document.getElementById('riskChart').getContext('2d');
      if(riskChartInstance) riskChartInstance.destroy(); 
      riskChartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Kritik', 'Orta', 'Güvenli'],
          datasets: [{ data: [kritik, orta, dusuk], backgroundColor: ['#ef4444', '#f97316', '#22c55e'], borderWidth: 0, hoverOffset: 4 }]
        },
        options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } }, maintainAspectRatio: false }
      });
    }

    function olusturRaporKarti(r) {
      const riskRenk = r.risk_seviyesi === 'KRİTİK' ? 'bg-red-100 text-red-700 border-red-200' : (r.risk_seviyesi === 'ORTA' ? 'bg-orange-100 text-orange-700 border-orange-200' : 'bg-green-100 text-green-700 border-green-200');
      const personelAd = r.personel ? r.personel.ad_soyad : 'Bilinmeyen Personel';
      const santiyeAd = r.personel ? r.personel.santiye : '';
      const tarih = new Date(r.olusturulma_tarihi).toLocaleString('tr-TR', { dateStyle: 'short', timeStyle: 'short' });
      
      let fotoHTML = '';
      if (r.fotograflar && r.fotograflar.trim() !== '') {
        const fotolar = r.fotograflar.split(',');
        fotoHTML = `<div class="flex gap-2 mt-3 overflow-x-auto pb-2 no-scrollbar">` + 
          fotolar.map(f => `<a href="${f}" target="_blank"><img src="${f}" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-xl border-2 border-slate-200 hover:border-blue-500 transition shadow-sm"></a>`).join('') + `</div>`;
      }

      let aksiyonHTML = '';
      const aksiyon = r.aksiyonlar && r.aksiyonlar.length > 0 ? r.aksiyonlar[0] : null;

      if (!aksiyon) {
        aksiyonHTML = `<button onclick="aksiyonModalAc('${r.id}')" class="text-xs md:text-sm bg-white border border-slate-300 text-slate-700 hover:text-blue-600 hover:border-blue-400 px-3 py-1.5 rounded-lg font-bold transition shadow-sm"><i class="fas fa-plus mr-1"></i> Aksiyon Ata</button>`;
      } else {
        if (aksiyon.durum === 'AÇIK') {
          aksiyonHTML = `
            <div class="w-full bg-orange-50 border border-orange-200 p-3 rounded-xl mt-2 flex justify-between items-center gap-2">
              <div class="min-w-0 flex-1">
                <p class="text-[10px] font-bold text-orange-600 uppercase"><i class="fas fa-hard-hat mr-1"></i> MÜDAHALE BEKLENİYOR</p>
                <p class="text-xs md:text-sm font-semibold text-slate-800 truncate">${aksiyon.aksiyon_metni}</p>
                <p class="text-[10px] text-slate-500">Sorumlu: <b>${personelSozluk[aksiyon.sorumlu_id] || 'Bilinmiyor'}</b></p>
              </div>
              <button onclick="aksiyonCozuldu('${aksiyon.id}')" class="bg-green-500 hover:bg-green-600 text-white p-2 md:p-3 rounded-lg shadow transition flex-shrink-0"><i class="fas fa-check text-sm"></i></button>
            </div>
          `;
        } else {
          const cozumTarihi = new Date(aksiyon.cozum_tarihi).toLocaleString('tr-TR', { dateStyle: 'short', timeStyle: 'short' });
          aksiyonHTML = `
            <div class="w-full bg-green-50 border border-green-200 p-2.5 rounded-xl mt-2 opacity-75 text-[11px] md:text-xs">
              <p class="font-bold text-green-700 uppercase"><i class="fas fa-check-double mr-1"></i> ÇÖZÜLDÜ</p>
              <p class="text-slate-600 mt-0.5">Sorumlu <b>${personelSozluk[aksiyon.sorumlu_id] || 'Bilinmiyor'}</b> kapattı. (${cozumTarihi})</p>
            </div>
          `;
        }
      }

      return `
        <div class="p-4 md:p-5 border border-slate-200 rounded-2xl bg-white hover:border-blue-200 transition shadow-sm flex flex-col">
          <div class="flex justify-between items-start mb-2 gap-2">
            <div class="min-w-0">
              <h4 class="font-bold text-slate-800 text-sm md:text-base truncate">${personelSozluk[r.personel_id] || personelAd} <span class="text-xs font-normal text-slate-500 ml-1 hidden sm:inline">${santiyeAd}</span></h4>
              <span class="text-[10px] md:text-xs text-slate-400"><i class="far fa-clock"></i> ${tarih}</span>
            </div>
            <span class="px-2 py-0.5 md:px-3 md:py-1 rounded-full text-[10px] md:text-xs font-bold border flex-shrink-0 ${riskRenk}">${r.risk_seviyesi || 'BELİRSİZ'}</span>
          </div>
          <p class="text-xs md:text-sm text-slate-700 leading-relaxed mt-1">${r.rapor_metni}</p>
          ${r.ai_aciklama ? `<div class="mt-2 text-[11px] md:text-xs text-slate-500 bg-slate-50 p-2 rounded-lg border border-dashed border-slate-300"><i class="fas fa-robot text-indigo-500 mr-1"></i> <b>AI:</b> ${r.ai_aciklama}</div>` : ''}
          ${fotoHTML}
          <div class="mt-3 border-t border-slate-100 pt-2.5 flex justify-between items-center w-full flex-wrap gap-2">
            <div class="flex-1 min-w-[200px]">${aksiyonHTML}</div>
            ${r.gps_enlem ? `<a href="http://maps.google.com/?q=${r.gps_enlem},${r.gps_boylam}" target="_blank" class="text-[11px] font-semibold text-blue-600 hover:text-blue-800 bg-blue-50 px-2.5 py-1.5 rounded-lg transition self-end"><i class="fas fa-map-marker-alt"></i> Konum</a>` : ''}
          </div>
        </div>
      `;
    }

    // --- AKSİYON FONKSİYONLARI ---

      seciliRaporId = raporId;
      const select = document.getElementById('sorumluSecim');

      document.getElementById('aksiyonModal').classList.remove('hidden');

    async function aksiyonKaydet() {
      const sorumluId = document.getElementById('sorumluSecim').value;

    async function aksiyonCozuldu(aksiyonId) {
      if(!confirm("Emin misiniz?")) return;
      const { error } = await db.from('aksiyonlar').update({ durum: 'ÇÖZÜLDÜ', cozum_tarihi: new Date().toISOString() }).eq('id', aksiyonId);

            <div id="aiSonucAlani" class="hidden w-full mt-6 text-left"><div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 relative"><div id="analizYazisi" class="text-sm text-slate-800 space-y-3 leading-relaxed mt-2"></div></div></div>

      document.getElementById('aiBtn').addEventListener('click', function() { calistirAI(tumRaporlar); });

    async function calistirAI(metin) {
      if (metin === "Rapor yok") return alert("Rapor bulunamadı!");
      const btn = document.getElementById('aiBtn'); const sonucAlani = document.getElementById('aiSonucAlani'); const analizYazisi = document.getElementById('analizYazisi');
      btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Analiz Ediliyor...`; btn.disabled = true;
      const prompt = `İSG uzmanısın. Raporlardan çalışan profili çıkar (1.İSG, 2.Psikoloji, 3.Puan). Raporlar: ${metin}`;
      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        const result = await response.json();
        let analiz = result.candidates[0].content.parts[0].text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-900 block mt-3 mb-1 text-sm font-bold">$1</strong>').replace(/\n/g, '<br>');
        sonucAlani.classList.remove('hidden'); analizYazisi.innerHTML = analiz;
      } catch(e) { alert("Yoğunluk var."); } finally { btn.innerHTML = `<i class="fas fa-brain"></i> Derin AI Analizi`; btn.disabled = false; }
    }

    // --- FİNANS FONKSİYONLARI ---
    async function finansVerileriniYukle() {
      const seciliYil = document.getElementById('filtreYil').value;
      const seciliAy = document.getElementById('filtreAy').value;
      let sorgu = db.from('puantaj_maliyet').select('*').eq('donem_yil', seciliYil);
      if (seciliAy !== 'TÜMÜ') { sorgu = sorgu.eq('donem_ay', seciliAy); }

      const { data: finanslar, error } = await sorgu.order('donem_ay', {ascending: false}).order('olusturulma_tarihi', {ascending: false});
      const tableBody = document.getElementById('finansTableBody');
      
      if(error || !finanslar || finanslar.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400"><i class="fas fa-folder-open text-xl mb-1"></i><br>Seçilen döneme ait kayıt bulunamadı.</td></tr>`;
        document.getElementById('toplamNetMaas').textContent = "₺0"; document.getElementById('toplamSgkKesintisi').textContent = "₺0"; document.getElementById('toplamBrutMaliyet').textContent = "₺0";
        globalFinansMetni = "";
        return;
      }

      aktifFinansData = finanslar; 
      let toplamNet = 0, toplamSgk = 0, toplamBrut = 0;
      let raporMetniBirikimi = [];

      tableBody.innerHTML = finanslar.map(f => {
        toplamNet += f.net_maas; toplamSgk += f.sgk_kesintisi; toplamBrut += f.brut_maas;
        const pIsim = personelSozluk[f.personel_id] || "Bilinmeyen Personel";
        raporMetniBirikimi.push(`${pIsim} (${f.donem_ay} ${f.donem_yil}): Net=${f.net_maas}, SGK=${f.sgk_kesintisi}, Brüt=${f.brut_maas}, Ç.Gün=${f.calisma_gunu}`);

        return `
          <tr class="hover:bg-slate-50 transition font-medium">
            <td class="p-4 font-bold text-slate-800">${pIsim}</td>
            <td class="p-4 text-slate-500">${f.donem_ay} ${f.donem_yil}</td>
            <td class="p-4"><span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">${f.calisma_gunu} Ç</span> / <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">${f.hafta_tatili} HT</span></td>
            <td class="p-4 text-emerald-600 font-bold">₺${f.net_maas.toLocaleString('tr-TR')}</td>
            <td class="p-4 text-amber-600 font-bold">₺${f.sgk_kesintisi.toLocaleString('tr-TR')}</td>
            <td class="p-4 text-blue-900 font-black">₺${f.brut_maas.toLocaleString('tr-TR')}</td>
            <td class="p-4 text-center">
              <button onclick="finansModalAc('${f.id}')" class="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-3 py-1.5 rounded-lg text-sm transition shadow-sm" title="Düzenle"><i class="fas fa-edit"></i></button>
            </td>
          </tr>
        `;
      }).join('');

      document.getElementById('toplamNetMaas').textContent = `₺${toplamNet.toLocaleString('tr-TR')}`;
      document.getElementById('toplamSgkKesintisi').textContent = `₺${toplamSgk.toLocaleString('tr-TR')}`;
      document.getElementById('toplamBrutMaliyet').textContent = `₺${toplamBrut.toLocaleString('tr-TR')}`;
      globalFinansMetni = raporMetniBirikimi.join(' | ');
    }

    function finansModalKapat() { document.getElementById('finansModal').classList.add('hidden'); duzenlenenFinansId = null; }
    function otomatikBrutHesapla() {
      const net = parseFloat(document.getElementById('finansNetMaas').value) || 0;
      const sgk = parseFloat(document.getElementById('finansSgkKesintisi').value) || 0;
      document.getElementById('finansBrutMaas').value = (net + sgk).toFixed(2);
    }
    async function finansKaydet() {
      const yil = document.getElementById('finansModalYil').value;
      const ay = document.getElementById('finansModalAy').value;
      const pId = document.getElementById('finansPersonelSecim').value;
      const net = parseFloat(document.getElementById('finansNetMaas').value);
      const sgk = parseFloat(document.getElementById('finansSgkKesintisi').value);
      const brut = parseFloat(document.getElementById('finansBrutMaas').value);
      const cGunu = parseInt(document.getElementById('finansCalismaGunu').value) || 0;
      const htGunu = parseInt(document.getElementById('finansHtGunu').value) || 0;

      if(!pId || isNaN(net) || isNaN(sgk)) return alert("Lütfen Personel, Net ve SGK alanlarını doldurun.");

      const btn = document.getElementById('finansKaydetBtn');
      btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Kaydediliyor...`; btn.disabled = true;

      const veriPaketi = { personel_id: pId, donem_ay: ay, donem_yil: parseInt(yil), net_maas: net, sgk_kesintisi: sgk, brut_maas: brut, calisma_gunu: cGunu, hafta_tatili: htGunu };
      let error = null;

      if (duzenlenenFinansId) {
        const { error: updErr } = await db.from('puantaj_maliyet').update(veriPaketi).eq('id', duzenlenenFinansId);
        error = updErr;
      } else {
        const { data: kontrol } = await db.from('puantaj_maliyet').select('id').eq('personel_id', pId).eq('donem_ay', ay).eq('donem_yil', yil);
        if (kontrol && kontrol.length > 0) {
          if(!confirm("Bu personelin seçilen ayda zaten kaydı var. Üzerine yazılsın mı?")) { btn.innerHTML = `Kaydet`; btn.disabled = false; return; }
          const { error: updErr } = await db.from('puantaj_maliyet').update(veriPaketi).eq('id', kontrol[0].id);
          error = updErr;
        } else {
          const { error: insErr } = await db.from('puantaj_maliyet').insert(veriPaketi);
          error = insErr;
        }
      }
      btn.innerHTML = `Kaydet`; btn.disabled = false;
      if(error) { alert("Kayıt sırasında hata oluştu."); } else { finansModalKapat(); finansVerileriniYukle(); } 
    }
    async function calistirFinansAI() {
      if(!globalFinansMetni) return alert("Analiz edilecek finansal veri bulunamadı! Lütfen bir ay seçin.");
      
      const ozelKomut = document.getElementById('aiFinansKomut').value.trim();
      const seciliAy = document.getElementById('filtreAy').value;
      const seciliYil = document.getElementById('filtreYil').value;

      const btn = document.getElementById('aiFinansBtn');
      const sonucAlani = document.getElementById('aiFinansSonucAlani');
      const analizYazisi = document.getElementById('finansAnalizYazisi');

      btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Zeka Devrede...`; btn.disabled = true;

      let prompt = `Sen kıdemli bir kurumsal finans analisti ve maliyet muhasebesi uzmanısın. İncelenen Dönem: ${seciliAy} ${seciliYil}. `;
      if(ozelKomut) { prompt += `\n\nKULLANICININ ÖZEL İSTEĞİ: "${ozelKomut}"\nLütfen analizini doğrudan bu isteğe odaklanarak yap.`; } 
      else { prompt += `\n\nAşağıdaki ham verileri konsolide ederek şu 3 başlık altında stratejik bir makro finans raporu hazırla:\n**1. MALİYET VE BÜTÇE DENGESİ:** Toplam iş gücü maliyet analizi.\n**2. ANOMALİ VE OPTİMİZASYON:** Verimlilik analizi ve bütçe aşım tehlikeleri.\n**3. STRATEJİK YÖNETİCİ ÖZETİ:** Kısa aksiyon tavsiyesi.`; }
      prompt += `\n\nİşte finansal veriler: ${globalFinansMetni}`;

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        const result = await response.json();
        let analiz = result.candidates[0].content.parts[0].text;
        analiz = analiz.replace(/\*\*(.*?)\*\*/g, '<strong class="text-blue-900 block mt-4 mb-1 text-sm font-bold">$1</strong>').replace(/\n/g, '<br>');
        sonucAlani.classList.remove('hidden'); analizYazisi.innerHTML = analiz;
      } catch(e) { alert("AI sunucuları yoğun, lütfen tekrar deneyin."); } 
      finally { btn.innerHTML = `<i class="fas fa-analytics"></i> AI Raporu Üret`; btn.disabled = false; }
    }
  </script>
