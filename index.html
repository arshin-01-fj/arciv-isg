<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArCiv — Sisteme Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="config.js"></script>
  <style>
    /* Arka plan için ince noktalı kurumsal bir desen */
    .bg-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 bg-pattern flex items-center justify-center p-4">
  
  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md border border-slate-100 relative overflow-hidden">
    
    <!-- Üst Kurumsal Çizgi -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-900 to-blue-500"></div>

    <div class="text-center mb-10">
      <div class="w-20 h-20 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-inner border border-blue-100">
        <i class="fas fa-shield-alt text-4xl text-blue-900"></i>
      </div>
      <h1 class="text-3xl font-black text-slate-800 tracking-tight">ArCiv</h1>
      <p class="text-slate-500 mt-2 text-sm font-medium">Arıkan İSG Saha İşletim Sistemi</p>
    </div>

    <div id="loginForm" class="space-y-5">
      <div class="relative">
        <i class="fas fa-envelope absolute left-4 top-4 text-slate-400"></i>
        <input id="kullaniciAdi" type="text" placeholder="Kullanıcı Adı (örn: isim.soyisim@arikan.com)" class="w-full border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition bg-slate-50"/>
      </div>
      <div class="relative">
        <i class="fas fa-lock absolute left-4 top-4 text-slate-400"></i>
        <input id="sifre" type="password" placeholder="Şifreniz" class="w-full border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition bg-slate-50"/>
      </div>
      <button id="girisButonu" onclick="girisYap()" class="w-full bg-gradient-to-r from-blue-900 to-blue-700 hover:from-blue-800 hover:to-blue-600 text-white font-bold py-4 rounded-xl transition shadow-lg flex items-center justify-center gap-2 mt-2 text-lg">
        <i class="fas fa-sign-in-alt"></i> Sisteme Giriş Yap
      </button>
    </div>

    <!-- Hata Mesajı Kutusu (Daha dikkat çekici) -->
    <div id="hataMesaji" class="hidden mt-6 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm text-center font-semibold flex items-center justify-center gap-2">
       <i class="fas fa-exclamation-circle"></i> <span></span>
    </div>
  </div>

  <script>
    // 1. OTURUM KONTROLÜ
    window.onload = async function() {
      const pId = localStorage.getItem('kullanici_id');
      if (pId) {
        // Ekranı hafif soluk yap ki yönlendirme olana kadar kullanıcı bir şeye tıklamasın
        document.body.classList.add('opacity-50', 'pointer-events-none'); 
        
        // Önce LocalStorage'daki hazır role bak, yoksa veritabanından çek
        let rol = localStorage.getItem('rol');
        if (!rol) {
          const { data } = await db.from('personel').select('rol').eq('id', pId).single();
          rol = data ? data.rol : 'personel';
        }

        if (rol === 'yonetici' || rol === 'admin') {
          window.location.href = 'admin_panel.html';
        } else {
          window.location.href = 'form.html';
        }
      }
    };

    // 2. GİRİŞ YAP FONKSİYONU
    async function girisYap() {
      const kAdi = document.getElementById('kullaniciAdi').value.trim();
      const sif = document.getElementById('sifre').value.trim();
      const btn = document.getElementById('girisButonu');
      const hataKutusu = document.getElementById('hataMesaji');

      if (!kAdi || !sif) { 
        gosterHata('Lütfen e-posta ve şifrenizi eksiksiz girin.'); 
        return; 
      }

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Doğrulanıyor...';
      btn.disabled = true;
      hataKutusu.classList.add('hidden');

      try {
        // ÖNEMLİ: Supabase'de 'personel' tablosunda e-postaları tuttuğun sütun adının 'kullanici_adi' 
        // olduğundan emin ol. Değilse buradaki 'kullanici_adi' yazısını değiştir.
        const { data, error } = await db
          .from('personel')
          .select('*')
          .eq('kullanici_id', kAdi) 
          .eq('sifre', sif)
          .single();

        if (error || !data) throw new Error("Girdiğiniz bilgiler hatalı veya sistemde bulunamadı.");

        // Giriş başarılı, verileri kaydet
        localStorage.setItem('kullanici_id', data.id);
        localStorage.setItem('ad_soyad', data.ad_soyad);
        localStorage.setItem('rol', data.rol || 'personel');

        // Yönlendirme
        if (data.rol === 'yonetici' || data.rol === 'admin') {
          window.location.href = 'admin_panel.html';
        } else {
          window.location.href = 'form.html';
        }

      } catch (err) {
        gosterHata(err.message);
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sisteme Giriş Yap';
        btn.disabled = false;
      }
    }

    // Hata gösterme animasyonu
    function gosterHata(mesaj) {
      const hataKutusu = document.getElementById('hataMesaji');
      hataKutusu.querySelector('span').textContent = mesaj;
      hataKutusu.classList.remove('hidden');
      // Hafifçe titreme animasyonu
      hataKutusu.classList.add('animate-pulse');
      setTimeout(() => hataKutusu.classList.remove('animate-pulse'), 500);
    }

    // Enter tuşuyla giriş yapabilme
    document.addEventListener('keydown', e => { if (e.key === 'Enter') girisYap(); });
  </script>
</body>
</html>
